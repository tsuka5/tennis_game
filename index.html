<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>タッチ・スマッシュ</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b3d2e;
        overflow: hidden;
        /* prevent iOS double-tap zoom / text selection during play */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        font-family: system-ui, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      /* Orientation guidance overlay. iOS Safari cannot lock orientation
         (screen.orientation.lock is unsupported), so we guide via CSS overlay.
         See docs/specs/03-controls-ux.md 3.4 / 09-open-questions.md Q-9. */
      #rotate-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: #0b3d2e;
        color: #eafff5;
        z-index: 9999;
        text-align: center;
        padding: 24px;
      }
      #rotate-overlay .icon {
        font-size: 64px;
        animation: rot 1.8s ease-in-out infinite;
      }
      @keyframes rot {
        0%, 40% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(-90deg); }
      }
      /* Show the overlay only in portrait orientation. */
      @media (orientation: portrait) {
        #rotate-overlay {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate-overlay">
      <div class="icon">📱</div>
      <div>端末を横にしてください</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
