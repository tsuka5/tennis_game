<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Touch Smash — P2P テニス</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎾%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app"></div>

    <!-- ===== メニュー ===== -->
    <div id="menu" class="screen">
      <div class="menu-card">
        <h1 class="title">TOUCH<span class="accent">SMASH</span></h1>
        <p class="subtitle">P2P オンライン対戦テニス</p>

        <div id="menu-home">
          <button id="btn-practice" class="btn big">🎾 ひとりで練習（AI対戦）</button>
          <button id="btn-create" class="btn big primary">🏟 ルームを作る</button>
          <button id="btn-join" class="btn big">🔑 ルームに参加</button>
          <p class="hint-line">同じルームコードを共有した相手と P2P で対戦できます</p>
        </div>

        <div id="menu-host" hidden>
          <p class="panel-label">ルームコード</p>
          <div id="room-code" class="room-code">-----</div>
          <p class="hint-line">このコードを相手に伝えてください。<br />相手が参加すると自動で試合が始まります。</p>
          <div class="spinner"></div>
          <button id="btn-host-back" class="btn">← 戻る</button>
        </div>

        <div id="menu-join" hidden>
          <p class="panel-label">ルームコードを入力</p>
          <input id="join-input" class="code-input" maxlength="5" placeholder="ABCDE" autocomplete="off" />
          <p id="join-status" class="hint-line"></p>
          <button id="btn-join-go" class="btn big primary">参加する</button>
          <button id="btn-join-back" class="btn">← 戻る</button>
        </div>
      </div>
      <p class="credit">Three.js + WebRTC (PeerJS)</p>
    </div>

    <!-- ===== ゲーム中 HUD ===== -->
    <div id="hud" hidden>
      <div id="scoreboard">
        <div class="sb-row" id="sb-row-me">
          <span class="sb-name" id="sb-name-me">あなた</span>
          <span class="sb-games" id="sb-games-me">0</span>
          <span class="sb-points" id="sb-points-me">0</span>
        </div>
        <div class="sb-row" id="sb-row-opp">
          <span class="sb-name" id="sb-name-opp">あいて</span>
          <span class="sb-games" id="sb-games-opp">0</span>
          <span class="sb-points" id="sb-points-opp">0</span>
        </div>
      </div>

      <div id="msg"></div>
      <div id="serve-hint" hidden>ショットボタン（またはスペース）でサーブ</div>
      <div id="kbd-hint">移動: WASD / 矢印キー　　ショット: スペース　　ロブ: X</div>

      <!-- タッチ操作 -->
      <div id="joy-zone"></div>
      <div id="joy-base" hidden><div id="joy-knob"></div></div>
      <div id="touch-buttons">
        <button id="btnB" class="shot-btn lob">ロブ</button>
        <button id="btnA" class="shot-btn drive">ショット</button>
      </div>

      <button id="btn-quit" title="メニューへ戻る">✕</button>

      <!-- 試合終了 -->
      <div id="result" hidden>
        <div class="result-card">
          <div id="result-title">WIN</div>
          <div id="result-detail"></div>
          <button id="btn-rematch" class="btn big primary">もう一度</button>
          <button id="btn-result-menu" class="btn">メニューへ</button>
        </div>
      </div>
    </div>

    <!-- 縦画面ガイド -->
    <div id="rotate-overlay">
      <div class="icon">📱</div>
      <div>端末を横にしてください</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
